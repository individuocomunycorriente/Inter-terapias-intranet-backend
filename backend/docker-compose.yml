version: '3.8'

services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${NODE_ENV}
    ports:
      - "${PORT}:${PORT}" 
    environment:
      - PORT=${PORT}
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL} 
    volumes:
      - ./src:/app/src
      - /app/node_modules
    depends_on:
      - db
    command: sh -c "sleep 5 && npx prisma migrate dev --name add_admin --skip-generate && npx prisma db seed && npm run dev"
    
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}      
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
      POSTGRES_DB: ${DB_NAME}       
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: